# Footer configuration
# You should create one of these files for each language you support. E.g. /_data/en/footer.yml for the english version of the footer
# Footer content is organized in columns.
# You can also add a small print license statement at the bottom.

# Columns (the more you add, the narrower they will be)
columns:
  - description: | # Can be Markdown and multiline as shown here. 
      Observatorio Aguas Amazónicas es un proyecto de la Red de Observatorios de Aguas Amazónicas.
  
  - name: Contacto
    description: | # Can be Markdown
      * Alianza Aguas Amazónicas
      * [info@aguasamazonicas.org](mailto:info@aguasamazonicas.org)
      * Calle Chiclayo 1008 Miraflores
      * Lima - Perú
      * +51 (01) 447 1370
    connectIcons: false # Show social icons (defined in _config.yml)

  - name: Licencia de contenido    
    description: | # Can be Markdown
      * [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)
      * (Salvo que se indique lo contrario)
      * [Ir a la web de la Alianza](https://aguasamazonicas.org){:.button .target-blank}


